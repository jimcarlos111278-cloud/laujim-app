<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #1f2937; background: #f9fafb; }
    h1 { font-size: 16px; margin: 0 0 4px 0; display: flex; align-items: center; gap: 8px; }
    h1 small { font-size: 11px; color: #6b7280; font-weight: normal; }
    .sub { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
    .card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 12px; border: 1px solid #e5e7eb; }
    .status { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #10b981; }
    .dot.yellow { background: #f59e0b; }
    .dot.gray { background: #9ca3af; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #059669; color: white; }
    .btn-primary:hover:not(:disabled) { background: #047857; }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .btn-secondary:hover:not(:disabled) { background: #d1d5db; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .url-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f3f4f6; }
    .url-item:last-child { border-bottom: none; }
    .url-info { flex: 1; min-width: 0; }
    .url-name { font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .url-link { font-size: 10px; color: #3b82f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .url-link:hover { text-decoration: underline; }
    .url-actions { display: flex; gap: 4px; margin-left: 8px; }
    .actions { margin-top: 12px; display: flex; gap: 8px; }
    .empty { text-align: center; padding: 20px 0; color: #9ca3af; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-yellow { background: #fef3c7; color: #92400e; }
    .pre { font-size: 11px; background: #f3f4f6; padding: 8px; border-radius: 6px; margin: 8px 0; word-break: break-all; max-height: 80px; overflow-y: auto; }
    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>⚡ Llenar Laujim <small>v1.0.0</small></h1>
  <p class="sub">Auto-llenador de Facebook Marketplace</p>

  <div class="card">
    <div class="status">
      <span class="dot gray" id="statusDot"></span>
      <span id="statusText">Esperando datos...</span>
    </div>
    <div id="previewArea" style="display:none">
      <div class="pre" id="previewText"></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btnAutoFill" disabled>⚡ Auto-llenar ahora</button>
      <button class="btn btn-secondary btn-sm" id="btnClear">🗑 Limpiar</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong style="font-size:12px">📌 Anuncios guardados</strong>
      <span id="urlCount" style="font-size:11px;color:#6b7280">0</span>
    </div>
    <div id="urlList"></div>
  </div>

  <div class="card" style="text-align:center">
    <button class="btn btn-secondary btn-sm" id="btnOpenFB">🌐 Abrir Marketplace</button>
    <button class="btn btn-secondary btn-sm" id="btnOpenLaujim">🏠 Abrir Laujim</button>
  </div>

  <div id="toast" class="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
